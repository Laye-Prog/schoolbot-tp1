<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SchoolBot 🎓</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app-wrapper">

    <header class="app-header">
        <div class="header-brand">
            <div class="brand-logo">🎓</div>
            <div class="brand-text">
                <h1>SchoolBot</h1>
                <p>Ton assistant scolaire intelligent</p>
            </div>
        </div>
        <div class="header-controls">
            <button class="theme-toggle" id="theme-toggle" aria-label="Changer de thème">
                <span class="theme-icon sun">☀️</span>
                <span class="theme-icon moon">🌙</span>
            </button>
            <button class="clear-btn" id="clear-btn" title="Effacer">🗑️</button>
        </div>
    </header>

    <nav class="mode-selector">
        <button class="mode-btn active" data-mode="naturel">😊 Naturel</button>
        <button class="mode-btn" data-mode="roast">🔥 Roast</button>
        <button class="mode-btn" data-mode="sympathique">💖 Sympathique</button>
        <button class="mode-btn" data-mode="philosophique">🧘 Philosophique</button>
        <button class="mode-btn" data-mode="motivateur">🚀 Motivateur</button>
    </nav>

    <main class="chat-area">

        <!-- Suggestions rapides (Module 3) -->
        <div class="suggestions">
            <button class="suggestion-chip" onclick="sendSuggestion('Qui est Amadou ?')">👤 Qui est Amadou ?</button>
            <button class="suggestion-chip" onclick="sendSuggestion('Liste tous les étudiants')">📋 Liste étudiants</button>
            <button class="suggestion-chip" onclick="sendSuggestion('Fun fact sur Fatou')">🎉 Fun fact</button>
            <button class="suggestion-chip" onclick="sendSuggestion('Combien d\'étudiants ?')">📊 Stats</button>
            <button class="suggestion-chip" onclick="sendSuggestion('Surprise moi !')">🎲 Aléatoire</button>
        </div>

        <div id="chat-container"></div>

        <div class="input-area">
            <input type="text" id="user-input" placeholder="Ex: Qui est Moussa ? Fun fact sur Fatou ?" />
            <button class="send-btn" id="send-btn">
                <span class="btn-icon">📤</span>
            </button>
        </div>

    </main>

</div>

<!-- data.js AVANT app.js (Module 3) -->
<script src="js/data.js"></script>
<script src="js/app.js"></script>

<script>
    function sendSuggestion(text) {
        const input = document.getElementById('user-input');
        if (input) {
            input.value = text;
            if (window.triggerSend) window.triggerSend();
        }
    }
</script>

</body>
</html>
