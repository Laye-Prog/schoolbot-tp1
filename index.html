<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SchoolBot 🎓</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app-wrapper">

    <!-- HEADER — Partie 1 : bouton toggle thème -->
    <header class="app-header">
        <div class="header-brand">
            <div class="brand-logo">🎓</div>
            <div class="brand-text">
                <h1>SchoolBot</h1>
                <p>Ton assistant scolaire</p>
            </div>
        </div>
        <div class="header-controls">
            <!-- Partie 1 : Toggle Thème -->
            <button class="theme-toggle" id="theme-toggle" aria-label="Changer de thème">
                <span class="theme-icon sun">☀️</span>
                <span class="theme-icon moon">🌙</span>
            </button>
            <button class="clear-btn" id="clear-btn" title="Effacer">🗑️</button>
        </div>
    </header>

    <!-- SÉLECTEUR DE MODE — 5 modes dont Motivateur (bonus) -->
    <nav class="mode-selector">
        <button class="mode-btn active" data-mode="naturel">😊 Naturel</button>
        <button class="mode-btn" data-mode="roast">🔥 Roast</button>
        <button class="mode-btn" data-mode="sympathique">💖 Sympathique</button>
        <button class="mode-btn" data-mode="philosophique">🧘 Philosophique</button>
        <button class="mode-btn" data-mode="motivateur">🚀 Motivateur</button>
    </nav>

    <!-- ZONE DE CHAT -->
    <main class="chat-area">
        <div id="chat-container"></div>
        <div class="input-area">
            <input type="text" id="user-input" placeholder="Tape un message..." />
            <button class="send-btn" id="send-btn">
                <span class="btn-icon">📤</span>
            </button>
        </div>
    </main>

</div>

<script src="js/app.js"></script>

</body>
</html>
